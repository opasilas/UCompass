{% extends "base.html" %}

{% block title %}Set Deadline for Task{% endblock %}

{% block content %}
<div class="container">
    <h1>Set/Update Deadline for Task: "{{ task.title }}"</h1>
    <p>Assigned to: {{ task.student_email }}</p>

    <form action="{{ url_for('add_deadline', task_id=task.id) }}" method="post">
        <div class="form-group">
            <label for="deadline">Deadline Date:</label>
            <input type="date" id="deadline" name="deadline" value="{{ task.deadline if task.deadline else '' }}" required>
        </div>
        <button type="submit">Set Deadline</button>
    </form>
    <p><a href="{{ url_for('teacher_dashboard') }}">Back to Teacher Dashboard</a></p>
</div>
{% endblock %}
