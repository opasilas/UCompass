{% extends "base.html" %}

{% block title %}Set Deadline for Task{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1>Set Deadline</h1>

            <div class="card">
                <div class="card-header">
                    <h4>{{ task.title }}</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">Assigned to: <strong>{{ task.student_email }}</strong></p>

                    <form action="{{ url_for('main.add_deadline', task_id=task.id) }}" method="post">
                        <div class="form-group">
                            <label for="deadline" class="form-label">Deadline Date</label>
                            <input type="date" class="form-control" id="deadline" name="deadline" value="{{ task.deadline if task.deadline else '' }}" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Set Deadline</button>
                            <a href="{{ url_for('main.teacher_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
