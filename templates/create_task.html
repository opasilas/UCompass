{% extends "base.html" %}

{% block title %}Create Task{% endblock %}

{% block content %}
<div class="container">
    <h1>Create New Task</h1>
    <form action="{{ url_for('main.create_task') }}" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ title if title is defined else '' }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4">{{ description if description is defined else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" name="deadline" value="{{ deadline if deadline else '' }}">
        </div>

        <div class="actions">
            <button type="submit">Create Task</button>
            <a class="link" href="{{ url_for('main.student_dashboard') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
