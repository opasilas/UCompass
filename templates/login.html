{% extends "base.html" %}

{% block title %}Login - UCompass{% endblock %}

{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 200px);">
    <div class="row w-100">
        <div class="col-md-6 col-lg-4 mx-auto">
            <div class="card">
                <div class="card-body p-5">
                    <h1 class="text-center mb-4">UCompass</h1>
                    <p class="text-center text-muted mb-4">Sign in to your account</p>

                    <form action="{{ url_for('main.login') }}" method="post">
                        <div class="form-group mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" value="{{ email if email else '' }}" required>
                        </div>

                        <div class="form-group mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
                    </form>

                    <hr>

                    <div class="alert alert-info mb-0">
                        <small class="d-block mb-2"><strong>Demo Credentials:</strong></small>
                        <small class="d-block">Student: <code>student@example.com</code> / <code>password</code></small>
                        <small class="d-block">Teacher: <code>teacher@example.com</code> / <code>password</code></small>
                        <small class="d-block">Officer: <code>officer@example.com</code> / <code>password</code></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
