{% extends "base.html" %}

{% block title %}Login - UCompass{% endblock %}

{% block content %}
<div class="container">
    <h1>Login to UCompass</h1>
    <form action="{{ url_for('main.login') }}" method="post">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ email if email else '' }}" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p>
        <strong>Synthetic Credentials:</strong><br>
        {% for user in users %}
            {{ user.name }}: `{{ user.email }}` / `{{ user.password }}`<br>
        {% endfor %}
    </p>
</div>
{% endblock %}
