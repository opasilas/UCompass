{% extends "base.html" %}

{% block title %}Login - UCompass{% endblock %}

{% block content %}
<div class="container">
    <h1>Login to UCompass</h1>
    <form action="{{ url_for('main.login') }}" method="post">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ email if email else '' }}" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p>
        <strong>Synthetic Credentials:</strong><br>
        Student: `student@example.com` / `password`<br>
        Teacher: `teacher@example.com` / `password`<br>
        Wellbeing Officer: `officer@example.com` / `password`
    </p>
</div>
{% endblock %}
